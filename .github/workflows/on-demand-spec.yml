name: On-Demand SPEC Test (Tier 1.5)

# ============================================================================
# 触发: PR评论 `/run-spec [benchmark_type]`
# 
# 示例:
#   /run-spec                    -> 默认 spec06-0.8c
#   /run-spec spec06-1.0c        -> 指定benchmark类型
#
# 权限: OWNER/MEMBER/COLLABORATOR
# 
# 注意: benchmark_type的有效值由gem5-perf-template.yml定义，
#       无需在此重复验证，template会自动检查
# ============================================================================

on:
  issue_comment:
    types: [created]

jobs:
  check_and_trigger:
    name: Trigger SPEC Test
    runs-on: ubuntu-latest  # 只负责解析参数
    
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/run-spec') &&
      (github.event.comment.author_association == 'OWNER' || 
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    
    outputs:
      benchmark_type: ${{ steps.parse.outputs.benchmark }}
      vector_type: ${{ steps.parse.outputs.vector_type }}
    
    steps:
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });
      
      - name: Parse benchmark type
        id: parse
        run: |
          # 提取benchmark类型，默认为spec06-0.8c
          COMMENT="${{ github.event.comment.body }}"
          BENCHMARK=$(echo "$COMMENT" | grep -oP '/run-spec\s+\K\S+' || echo "spec06-0.8c")
          
          # 判断是否需要vector编译选项
          VECTOR_TYPE=""
          if [[ "$BENCHMARK" == *"rvv"* ]]; then
            VECTOR_TYPE="simple"
          fi
          
          echo "benchmark=$BENCHMARK" >> $GITHUB_OUTPUT
          echo "vector_type=$VECTOR_TYPE" >> $GITHUB_OUTPUT
          
          echo "🎯 Benchmark type: $BENCHMARK"
          echo "🔧 Vector type: ${VECTOR_TYPE:-none}"

  run_spec_test:
    name: Run SPEC Test
    needs: check_and_trigger
    # 调用template，实际测试在 [self-hosted, node] 上运行
    uses: ./.github/workflows/gem5-perf-template.yml
    with:
      script_path: ../kmh_v3_btb.sh
      benchmark_type: ${{ needs.check_and_trigger.outputs.benchmark_type }}
      vector_type: ${{ needs.check_and_trigger.outputs.vector_type }}
